  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"0dcb748e-aff5-4123-86b4-9763ce50f104\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;}\n  body{background:#E7E2D7;-webkit-font-smoothing:antialiased;}\n  @keyframes tl-toast{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}\n  @keyframes tl-fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}\n  @keyframes tl-sheet{from{transform:translateY(100%);}to{transform:translateY(0);}}\n  @keyframes tl-dim{from{opacity:0;}to{opacity:1;}}\n  @keyframes tl-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:fixed;inset:0;background:#E7E2D7;display:flex;flex-direction:column;align-items:center;box-sizing:border-box;font-family:-apple-system,'SF Pro',system-ui,sans-serif;overflow:hidden;\">\n\n  <div style=\"flex-shrink:0;display:flex;align-items:center;gap:10px;padding:16px 0 10px;\">\n    <div style=\"width:11px;height:11px;border-radius:50%;border:2px solid #D98E2B;\"><\u002Fdiv>\n    <div style=\"font-size:15px;font-weight:600;letter-spacing:0.04em;color:#1B2840;\">THROUGHLINE<\u002Fdiv>\n    <div style=\"font-size:13px;font-weight:500;color:#938C7E;margin-left:6px;\">Interactive prototype<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;width:100%;min-height:0;display:flex;align-items:center;justify-content:center;gap:36px;overflow:auto;padding:4px 16px 16px;box-sizing:border-box;\">\n\n    <!-- ============ MENTEE PHONE ============ -->\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;\">\n      <div style=\"font-size:12px;font-weight:600;letter-spacing:0.05em;color:#938C7E;text-transform:uppercase;\">Mentee · Maya<\u002Fdiv>\n\n      <x-import component-from-global-scope=\"IOSDevice\" from=\"246707d1-aa29-4413-a612-3fac8c137c09#/ios-frame.jsx\" height=\"{{ deviceH }}\" hint-size=\"402px,874px\">\n        <div style=\"position:relative;min-height:100%;background:#F5F2EC;font-family:-apple-system,system-ui;color:#1B2840;\">\n\n          <!-- ---------- ONBOARDING ---------- -->\n          <sc-if value=\"{{ isOnboarding }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"min-height:100%;display:flex;flex-direction:column;padding:68px 24px 36px;\">\n\n            <!-- progress thread -->\n            <div style=\"display:flex;align-items:center;gap:0;padding:0 6px 30px;\">\n              <sc-for list=\"{{ obDots }}\" as=\"dot\" hint-placeholder-count=\"4\">\n                <sc-if value=\"{{ dot.notFirst }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"flex:1;height:2px;background:rgba(217,142,43,0.28);\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ dot.filled }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"width:12px;height:12px;border-radius:50%;background:#D98E2B;flex-shrink:0;box-shadow:0 0 0 4px #FBEEDA;\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ dot.empty }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"width:10px;height:10px;border-radius:50%;background:#EAE4DA;flex-shrink:0;\"><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- step 0: welcome / linkedin -->\n            <sc-if value=\"{{ ob0 }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;animation:tl-fade .3s ease;\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:26px;\">\n                <div style=\"width:15px;height:15px;border-radius:50%;border:2.5px solid #D98E2B;\"><\u002Fdiv>\n                <div style=\"font-size:21px;font-weight:700;letter-spacing:-0.02em;\">Throughline<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:27px;font-weight:700;line-height:1.18;letter-spacing:-0.02em;margin-bottom:16px;\">Keep the people who shaped your career — even after they leave.<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:500;line-height:1.5;color:#5C6478;\">Companies change. The throughline doesn't. We'll find the mentors already in your circle and help you keep those threads alive.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <div onclick=\"{{ obNext }}\" style=\"display:flex;align-items:center;justify-content:center;gap:10px;height:54px;border-radius:13px;background:#0A66C2;cursor:pointer;\" style-active=\"{{ pressStyle }}\">\n                <div style=\"width:22px;height:22px;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#0A66C2;font-family:Georgia,serif;\">in<\u002Fdiv>\n                <span style=\"color:#fff;font-size:16px;font-weight:600;\">Continue with LinkedIn<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"text-align:center;font-size:12.5px;font-weight:500;color:#938C7E;\">We use your connections to suggest mentors — we never post anything.<\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- step 1: claim handle -->\n            <sc-if value=\"{{ ob1 }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"flex:1;animation:tl-fade .3s ease;\">\n              <div style=\"font-size:13px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#D98E2B;margin-bottom:14px;\">Step 2 of 4<\u002Fdiv>\n              <div style=\"font-size:24px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;margin-bottom:10px;\">Claim your throughline<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:500;line-height:1.5;color:#5C6478;margin-bottom:24px;\">It's yours — not your employer's. This handle stays the same no matter where you work next.<\u002Fdiv>\n\n              <!-- LinkedIn connected profile card -->\n              <div style=\"background:#fff;border:1.5px solid #EAE4DA;border-radius:14px;padding:14px;display:flex;align-items:center;gap:13px;margin-bottom:11px;\">\n                <div style=\"width:52px;height:52px;border-radius:50%;background:#C97B4A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:600;flex-shrink:0;\">MC<\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"display:flex;align-items:center;gap:7px;\">\n                    <span style=\"font-size:16px;font-weight:700;color:#1B2840;\">Maya Chen<\u002Fspan>\n                    <div style=\"width:17px;height:17px;border-radius:3px;background:#0A66C2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;font-family:Georgia,serif;\">in<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:13px;font-weight:500;color:#5C6478;margin-top:2px;\">Product Designer · ex-Stripe, Google<\u002Fdiv>\n                  <div style=\"font-size:12.5px;font-weight:500;color:#938C7E;margin-top:3px;\">847 connections<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:24px;height:24px;border-radius:50%;background:#E5F0E9;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n                  <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#4F8A6B\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:26px;padding:0 4px;\">\  from: 'them', text: 'Much stronger. I’d add one adoption metric right under it.', when: '1d ago' },\n      ],\n      influence: [\n        { from: 'them', text: 'Start with the 5 teams list — we can map rituals next time.', when: '3d ago' },\n      ],\n      transition: [\n        { from: 'them', text: 'Your listening plan looks solid. Resist the urge to fix things in week one.', when: '4d ago' },\n      ],\n      listening: [],\n    },\n  };\n\n  componentDidMount() {\n    if (this.props.startOnHome) this.setState({ menteeScreen: 'home' });\n    this._timer = setInterval(() => {\n      if (this.state.menteeScreen === 'meeting' && this.state.recording) {\n        this.setState((s) => ({ meetingSeconds: s.meetingSeconds + 1 }));\n      }\n    }, 1000);\n    this._fit = () => {\n      var h = Math.max(560, Math.min(880, window.innerHeight - 140));\n      if (h !== this.state.deviceH) this.setState({ deviceH: h });\n    };\n    window.addEventListener('resize', this._fit);\n    this._fit();\n  }\n\n  componentWillUnmount() {\n    if (this._timer) clearInterval(this._timer);\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n\n  info() {\n    return {\n      priya: { id: 'priya', firstName: 'Priya', initials: 'PN', color: '#A8557B', name: 'Priya Nair', roleCompany: 'Design Director · Figma', met: 'You met at Stripe, 2023', streak: '7-mo thread',\n        goals: ['Grow into design leadership', 'Navigate the first director role'],\n        thread: [\n          { type: 'session', date: 'Mar 14', note: 'Giving hard feedback to senior reports' },\n          { type: 'move', date: 'Jan 2025', note: 'Priya moved from Stripe → Figma' },\n          { type: 'session', date: 'Dec 8', note: 'Mock panel for your promo case' },\n          { type: 'session', date: 'Oct 2', note: 'First catch-up after you left Stripe', milestone: 'Reconnected after a job change' },\n          { type: 'origin', date: '2023', note: 'You met at Stripe.' },\n        ],\n        slot cks: { ...S.picks, [c.id]: !S.picks[c.id] } }) }));\n    const listLabel = searching ? (matched.length + ' result' + (matched.length === 1 ? '' : 's')) : 'Recommended from your activity';\n    const noResults = matched.length === 0;\n    const pickCount = Object.values(S.picks).filter(Boolean).length;\n    const cadOpts = [\n      { k: '4', label: 'Every 4 weeks', sub: 'A steady rhythm' },\n      { k: '8', label: 'Every 8 weeks', sub: 'A lighter touch' },\n      { k: 'drift', label: 'Only when a thread is drifting', sub: 'We watch the gaps for you' },\n    ].map((o) => ({ ...o, on: S.cadence === o.k, borderColor: S.cadence === o.k ? '#D98E2B' : '#EAE4DA', ringColor: S.cadence === o.k ? '#D98E2B' : '#D5CDBE', onPick: () => this.setState({ cadence: o.k }) }));\n\n    // home relationships\n    const relationships = ['priya', 'daniel', 'lena'].map((id) => {\n      const m = info[id];\n      const booked = S.bookings[id];\n      const hasNext = !!booked;\n      return {\n        id, color: m.color, initials: m.initials, name: m.name, roleCompany: m.roleCompany, streak: m.streak,\n        hasNext, hasNext_off: !hasNext,\n        next: booked ? ('Next: ' + booked.day + ' · ' + booked.time) : '',\n        last: id === 'priya' ? 'Last met 9 weeks ago' : (id === 'lena' ? 'Last met 6 weeks ago' : 'Last met 3 weeks ago'),\n        onOpen: () => this.setState({ detailId: id, menteeScreen: 'detail' }),\n      };\n    });\n\n    const milestones = [\n      { label: 'First session', earned: true },\n      { label: 'Reconnected after a move', earned: true },\n      { label: '7-month thread', earned: true },\n      { label: '1 year of throughline', earned: false },\n    ].map((m) => ({ ...m, locked: !m.earned, labelColor: m.earned ? '#5C6478' : '#A39B8A' }));\n\n    // detail\n    const did = S.detailId;\n    const dm = info[did];\n    const booked = S.bookings[did] || null;\n    const detailBooked = !!booked;\n    const detailUnbooked = !booked;\n    const bookedLabel = booked ? (booked.day + ' · ' + booked.time) : '';\n    const goals = dm.goals.map((g) => ({ text: g }));\n    let rawThread = dm.thread;\n    if (S.sessionSaved && did === 'priya') {\n      rawThread = [{ type: 'session', date: 'Today', note: 'Mapped your Staff promo case — created a shared project', milestone: 'Session recorded' }, ...rawThread];\n    }\n    const threadNodes = rawThread.map((n, i) => ({\n      date: n.date, note: n.note, milestone: n.milestone || '',\n      isFirst: i === 0, isLast: i === rawThread.length - 1, notFirst: i !== 0, notLast: i !== rawThread.length - 1,\n      isSession: n.type === 'session', isMove: n.type === 'move', isOrigin: n.type === 'origin', notMove: n.type !== 'move',\n      hasMilestone: !!n.milestone,\n    }));\n\n    // book\n    const bm = info[did];\n    const bookGroups = bm.slots.map((g) => ({\n      day: g.day,\n      times: g.times.map((t) => {\n        const sel = !!(S.selSlot && S.selSlot.day === g.day && S.selSlot.time === t);\n        return { time: t, selected: sel, unselected: !sel, onPick: () => this.setState({ selSlot: { day: g.day, time: t } }) };\n      }),\n    }));\n    const confirmEnabled = !!S.selSlot;\n    const confirmDisabled = !S.selSlot;\n    const confirmLabel = S.selSlot ? ('Confirm ' + S.selSlot.time + ' →') : 'Select a time';\n\n    // mentor\n    const availPills = [\n      { k: 'tue5', label: 'Tue 5:00 PM' },\n      { k: 'wed12', label: 'Wed 12:00 PM' },\n      { k: 'fri9', label: 'Fri 9:00 AM' },\n      { k: 'fri4', label: 'Fri 4:00 PM' },\n      { k: 'mon6', label: 'Mon 6:00 PM' },\n    ].map((p) => ({ ...p, on: !!S.avail[p.k], off: !S.avail[p.k], onToggle: () => this.setState({ avail: { ...S.avail, [p.k]: !S.avail[p.k] } }) }));\n\n    let comingUp = [\n      { initials: 'MC', color: '#C97B4A', name: 'Maya Chen', firstName: 'Maya', time: 'Thu, Mar 27 · 4:30 PM' },\n      { initials: 'TR', color: '#7A8A4F', name: 'Tomas Reyes', firstName: 'Tomas', time: 'Fri, Mar 28 · 9:00 AM' },\n    ];\n    const ma
